# Example nginx config for WebSocket proxy on Oracle VM.
# Replace YOUR_DOMAIN and install: sudo cp to /etc/nginx/sites-available/chaos-server
#
# Cloudflare Pages (frontend) connects to wss://YOUR_DOMAIN/ws
# Point DNS A record to your Oracle VM public IP (orange cloud OK).

server {
    listen 80;
    server_name YOUR_DOMAIN;

    location / {
        return 200 'Chaos Management game server — use wss://YOUR_DOMAIN/ws';
        add_header Content-Type text/plain;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
